<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Removed manifest link to avoid 404 errors (icons missing). Add back if you fix the icon paths in manifest.json -->
  <title>Satisfaction Meter · Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
      padding: 1.5rem;
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 20%, rgba(79,70,229,0.1), transparent 70%);
      pointer-events: none;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      animation: fadeSlide 0.4s ease;
    }

    /* glass navigation */
    .nav-bar {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 80px;
      display: inline-flex;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .nav-bar a {
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      color: #f1f5f9;
      background: rgba(255,255,255,0.05);
    }
    .nav-bar a.active, .nav-bar a:hover {
      background: #4f46e5;
      color: white;
      box-shadow: 0 4px 12px rgba(79,70,229,0.5);
    }

    /* stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.3rem;
      box-shadow: 0 12px 28px -10px rgba(0,0,0,0.1);
      text-align: center;
      transition: all 0.25s;
      border: 1px solid rgba(255,255,255,0.6);
    }
    .stat-card:hover {
      transform: translateY(-5px);
      background: white;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
    }
    .stat-number {
      font-size: 2.4rem;
      font-weight: 800;
      margin: 0.5rem 0;
    }
    .stat-label {
      font-size: 0.85rem;
      color: #334155;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .happy-bg { color: #16a34a; }
    .neutral-bg { color: #ca8a04; }
    .unhappy-bg { color: #dc2626; }

    /* chart card */
    .chart-card {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 12px 30px -12px rgba(0,0,0,0.12);
      transition: transform 0.2s;
    }
    .chart-card h2 {
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      color: #0f172a;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    canvas {
      max-width: 100%;
      height: auto;
      background: #fefefe;
      border-radius: 1.2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      display: block;
      margin: 0 auto;
    }

    /* action buttons */
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .btn {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 0.7rem 1.4rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .btn-primary {
      background: linear-gradient(105deg, #4f46e5, #6366f1);
      color: white;
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(105deg, #4338ca, #4f46e5);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -6px #4f46e5b3;
    }
    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
      border-color: #fecaca;
    }
    .btn-danger:hover {
      background: #fecaca;
      transform: translateY(-2px);
    }
    .btn:hover:not(.btn-primary) {
      transform: translateY(-2px);
      background: #f8fafc;
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    }

    /* recent feedback */
    .recent-section {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem;
      box-shadow: 0 12px 28px -10px rgba(0,0,0,0.08);
    }
    .recent-section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #0f172a;
    }
    .feedback-list {
      max-height: 480px;
      overflow-y: auto;
      padding-right: 0.3rem;
    }
    .feedback-item {
      border-bottom: 1px solid #eef2ff;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      transition: background 0.15s;
      border-radius: 1rem;
    }
    .feedback-item:hover {
      background: #f8fafc;
    }
    .feedback-mood {
      font-size: 2rem;
      min-width: 55px;
      text-align: center;
    }
    .feedback-comment {
      flex: 2;
      font-size: 0.85rem;
      color: #1e293b;
      word-break: break-word;
      background: #f1f5f9;
      padding: 0.4rem 0.9rem;
      border-radius: 1rem;
    }
    .feedback-date {
      font-size: 0.7rem;
      color: #64748b;
      min-width: 150px;
      font-family: monospace;
    }
    .empty-msg {
      text-align: center;
      color: #94a3b8;
      padding: 2rem;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      body { padding: 1rem; }
      .stat-number { font-size: 1.8rem; }
      .feedback-item { flex-direction: column; align-items: flex-start; }
      .feedback-date { align-self: flex-start; }
      .btn { padding: 0.5rem 1.1rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="dashboard-container">
  <div class="nav-bar">
    <a href="https://bunny123-code.github.io/satisfaction-meter-mark2/index.html">📝 Customer Form</a>
    <a href="https://bunny123-code.github.io/satisfaction-meter-mark2/dashboard.html" class="active">📊 Dashboard</a>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-label">📊 Total Responses</div><div class="stat-number" id="totalCount">0</div></div>
    <div class="stat-card"><div class="stat-label">😊 Happy</div><div class="stat-number happy-bg" id="happyCount">0</div><div id="happyPercent" class="stat-label">0%</div></div>
    <div class="stat-card"><div class="stat-label">😐 Neutral</div><div class="stat-number neutral-bg" id="neutralCount">0</div><div id="neutralPercent" class="stat-label">0%</div></div>
    <div class="stat-card"><div class="stat-label">😠 Unhappy</div><div class="stat-number unhappy-bg" id="unhappyCount">0</div><div id="unhappyPercent" class="stat-label">0%</div></div>
  </div>

  <div class="chart-card">
    <h2>📈 Satisfaction Bar Chart — <span style="font-size:0.8rem;">beautiful & smooth</span></h2>
    <canvas id="moodChart" width="700" height="320" style="width:100%; max-width:750px; height:auto;"></canvas>
  </div>

  <div class="action-buttons">
    <button class="btn" id="refreshBtn">🔄 Refresh</button>
    <button class="btn btn-primary" id="exportBtn">📥 Export JSON</button>
    <button class="btn btn-primary" id="importBtn">📂 Import Data</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none" />
    <button class="btn btn-danger" id="resetBtn">⚠️ Reset All</button>
  </div>

  <div class="recent-section">
    <h2>📋 Recent 20 feedback entries</h2>
    <div id="feedbackListContainer" class="feedback-list">
      <div class="empty-msg">✨ Loading feedback...</div>
    </div>
  </div>
</div>

<script>
  // IndexedDB config
  const DB_NAME = 'SatisfactionMeterDB';
  const DB_VERSION = 1;
  const STORE_NAME = 'feedback';

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve(request.result);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
    });
  }

  async function getAllFeedback() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve(request.result || []);
      tx.oncomplete = () => db.close();
    });
  }

  async function clearAllFeedback() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const request = store.clear();
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve();
      tx.oncomplete = () => db.close();
    });
  }

  async function importFeedbackData(feedbackArray) {
    if (!Array.isArray(feedbackArray)) throw new Error('Invalid data format');
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    await new Promise((resolve, reject) => {
      const clearReq = store.clear();
      clearReq.onerror = () => reject(clearReq.error);
      clearReq.onsuccess = () => resolve();
    });
    for (const item of feedbackArray) {
      if (item.id && item.mood && item.timestamp) {
        store.add(item);
      }
    }
    return new Promise((resolve, reject) => {
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  // ========== ATTRACTIVE BAR CHART WITH ROUNDED BARS & GRADIENTS ==========
  function drawRoundedRect(ctx, x, y, width, height, radius, fillStyle, shadow = true) {
    ctx.save();
    if (shadow) {
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
    }
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    ctx.fillStyle = fillStyle;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.restore();
  }

  function drawAttractiveBarChart(happy, neutral, unhappy) {
    const canvas = document.getElementById('moodChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const containerWidth = canvas.clientWidth;
    const fixedHeight = 320;
    canvas.width = containerWidth;
    canvas.height = fixedHeight;

    const width = canvas.width;
    const height = canvas.height;
    if (width === 0) return;

    ctx.clearRect(0, 0, width, height);
    
    // background subtle gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
    bgGrad.addColorStop(0, '#fef9f0');
    bgGrad.addColorStop(1, '#ffffff');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, width, height);
    
    // draw light grid lines (horizontal)
    const maxVal = Math.max(happy, neutral, unhappy, 1);
    const topMargin = 45;
    const bottomMargin = 55;
    const chartHeight = height - topMargin - bottomMargin;
    const steps = 4;
    ctx.save();
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 0.8;
    ctx.fillStyle = '#64748b';
    ctx.font = '11px "Inter", system-ui';
    ctx.textAlign = 'right';
    for (let i = 0; i <= steps; i++) {
      const yVal = topMargin + (chartHeight / steps) * i;
      ctx.beginPath();
      ctx.moveTo(55, yVal);
      ctx.lineTo(width - 25, yVal);
      ctx.stroke();
      const labelVal = Math.round(maxVal - (maxVal / steps) * i);
      ctx.fillStyle = '#475569';
      ctx.fillText(labelVal, 45, yVal + 3);
    }
    
    // bar dimensions
    const barWidthRaw = (width - 110) / 3;
    const barWidth = Math.min(barWidthRaw, 130);
    const startX = (width - (barWidth * 3 + 40)) / 2;
    const bottomY = height - bottomMargin + 8;
    const maxBarHeight = chartHeight - 10;
    
    const bars = [
      { label: '😊 Happy', value: happy, color1: '#4ade80', color2: '#22c55e', baseColor: '#16a34a' },
      { label: '😐 Neutral', value: neutral, color1: '#facc15', color2: '#eab308', baseColor: '#ca8a04' },
      { label: '😠 Unhappy', value: unhappy, color1: '#f87171', color2: '#ef4444', baseColor: '#dc2626' }
    ];
    
    bars.forEach((bar, idx) => {
      const barHeight = maxVal === 0 ? 0 : (bar.value / maxVal) * maxBarHeight;
      const x = startX + idx * (barWidth + 20);
      const y = bottomY - barHeight;
      
      // create gradient for bar
      const gradient = ctx.createLinearGradient(x, y, x, bottomY);
      gradient.addColorStop(0, bar.color1);
      gradient.addColorStop(1, bar.color2);
      
      // rounded bar with shadow
      drawRoundedRect(ctx, x, y, barWidth, barHeight, 12, gradient, true);
      
      // label under bar
      ctx.fillStyle = '#1e293b';
      ctx.font = '500 13px "Inter", system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(bar.label, x + barWidth/2, bottomY + 18);
      
      // value on top of bar
      ctx.fillStyle = '#0f172a';
      ctx.font = 'bold 15px "Inter", system-ui';
      ctx.shadowBlur = 0;
      ctx.fillText(bar.value, x + barWidth/2, y - 6);
      
      // optional: small percentage (if total >0)
      const total = happy+neutral+unhappy;
      if (total > 0 && bar.value > 0) {
        const percent = ((bar.value/total)*100).toFixed(1);
        ctx.fillStyle = '#475569';
        ctx.font = '10px "Inter", system-ui';
        ctx.fillText(`${percent}%`, x + barWidth/2, y - 20);
      }
    });
    
    // axis styling
    ctx.beginPath();
    ctx.moveTo(48, bottomY);
    ctx.lineTo(width - 20, bottomY);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    ctx.restore();
    
    // title inside canvas (optional)
    ctx.font = 'italic 11px "Inter"';
    ctx.fillStyle = '#6c757d';
    ctx.textAlign = 'right';
    ctx.fillText('↑ happier ↑', width - 40, 30);
  }

  async function refreshDashboard() {
    try {
      const allFeedbacks = await getAllFeedback();
      const total = allFeedbacks.length;
      let happy = 0, neutral = 0, unhappy = 0;
      allFeedbacks.forEach(f => {
        if (f.mood === 'happy') happy++;
        else if (f.mood === 'neutral') neutral++;
        else if (f.mood === 'unhappy') unhappy++;
      });
      const happyPercent = total ? ((happy/total)*100).toFixed(1) : 0;
      const neutralPercent = total ? ((neutral/total)*100).toFixed(1) : 0;
      const unhappyPercent = total ? ((unhappy/total)*100).toFixed(1) : 0;

      document.getElementById('totalCount').innerText = total;
      document.getElementById('happyCount').innerText = happy;
      document.getElementById('neutralCount').innerText = neutral;
      document.getElementById('unhappyCount').innerText = unhappy;
      document.getElementById('happyPercent').innerHTML = `${happyPercent}%`;
      document.getElementById('neutralPercent').innerHTML = `${neutralPercent}%`;
      document.getElementById('unhappyPercent').innerHTML = `${unhappyPercent}%`;

      // draw enhanced chart
      drawAttractiveBarChart(happy, neutral, unhappy);

      const sorted = [...allFeedbacks].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
      const recent20 = sorted.slice(0,20);
      const container = document.getElementById('feedbackListContainer');
      if (recent20.length === 0) {
        container.innerHTML = '<div class="empty-msg">✨ No feedback yet. Let customers use the form!</div>';
        return;
      }
      container.innerHTML = '';
      recent20.forEach(item => {
        const moodEmoji = item.mood === 'happy' ? '😊' : (item.mood === 'neutral' ? '😐' : '😠');
        const dateObj = new Date(item.timestamp);
        const formattedDate = dateObj.toLocaleString();
        const commentText = item.comment || '(no comment)';
        const div = document.createElement('div');
        div.className = 'feedback-item';
        div.innerHTML = `
          <div class="feedback-mood">${moodEmoji}</div>
          <div class="feedback-comment">💬 ${escapeHtml(commentText.substring(0, 150))}${commentText.length > 150 ? '…' : ''}</div>
          <div class="feedback-date">📅 ${formattedDate}</div>
        `;
        container.appendChild(div);
      });
    } catch (err) {
      console.error(err);
      document.getElementById('feedbackListContainer').innerHTML = '<div class="empty-msg">Error loading data.</div>';
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function exportData() {
    const all = await getAllFeedback();
    const dataStr = JSON.stringify(all, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `satisfaction_export_${new Date().toISOString().slice(0,19)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  async function resetAllData() {
    const confirmReset = confirm('⚠️ WARNING: This will delete ALL feedback entries permanently. Are you sure?');
    if (!confirmReset) return;
    await clearAllFeedback();
    await refreshDashboard();
    alert('All data has been reset.');
  }

  function triggerImport() {
    document.getElementById('importFileInput').click();
  }

  async function handleImportFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const importedData = JSON.parse(text);
      if (!Array.isArray(importedData)) throw new Error('File must contain an array');
      for (let item of importedData) {
        if (!item.id || !item.mood || !item.timestamp) {
          throw new Error('Invalid feedback format in JSON');
        }
      }
      const confirmReplace = confirm(`Import ${importedData.length} entries? This will replace all current data.`);
      if (!confirmReplace) return;
      await importFeedbackData(importedData);
      await refreshDashboard();
      alert(`Successfully imported ${importedData.length} feedback entries.`);
    } catch (err) {
      alert('Import failed: ' + err.message);
    } finally {
      document.getElementById('importFileInput').value = '';
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', refreshDashboard);
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('resetBtn').addEventListener('click', resetAllData);
  document.getElementById('importBtn').addEventListener('click', triggerImport);
  document.getElementById('importFileInput').addEventListener('change', handleImportFile);

  refreshDashboard();

  // handle window resize to redraw chart responsively
  let resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(async () => {
      const all = await getAllFeedback();
      let happy = 0, neutral = 0, unhappy = 0;
      all.forEach(f => {
        if (f.mood === 'happy') happy++;
        else if (f.mood === 'neutral') neutral++;
        else if (f.mood === 'unhappy') unhappy++;
      });
      drawAttractiveBarChart(happy, neutral, unhappy);
    }, 150);
  });

  // Register service worker only if it exists (to avoid errors if sw.js is missing/broken)
  if ('serviceWorker' in navigator) {
    const swUrl = 'https://bunny123-code.github.io/satisfaction-meter-mark2/sw.js';
    navigator.serviceWorker.register(swUrl, { scope: '/satisfaction-meter-mark2/' })
      .then(reg => console.log('Dashboard: SW registered', reg))
      .catch(err => console.warn('SW registration skipped (expected if sw.js missing):', err));
  }
</script>
</body>
</html>

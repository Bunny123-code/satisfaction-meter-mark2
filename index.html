<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://bunny123-code.github.io/satisfaction-meter-mark2/icons/launchericon-192x192.png">
  <link rel="manifest" href="https://bunny123-code.github.io/satisfaction-meter-mark2/manifest.json">
  <title>Satisfaction Meter · Customer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 30%, #f0f4fe, #e6eefa);
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Modern navigation bar - absolute URLs */
    .nav-bar {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05), 0 1px 1px rgba(255,255,255,0.6) inset;
      display: inline-flex;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .nav-bar a {
      text-decoration: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;  /* smaller nav text */
      transition: all 0.25s ease;
      color: #1e293b;
      background: rgba(241,245,249,0.7);
    }
    .nav-bar a.active, .nav-bar a:hover {
      background: #4f46e5;
      color: white;
      box-shadow: 0 6px 14px rgba(79,70,229,0.35);
      transform: translateY(-1px);
    }

    /* Main card */
    .container {
      max-width: 550px;
      width: 100%;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
      padding: 1.5rem 1.5rem 1.8rem;
      transition: transform 0.2s;
    }

    h1 {
      font-size: 1.4rem;  /* smaller heading */
      font-weight: 700;
      background: linear-gradient(135deg, #1e293b, #4f46e5);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.2rem;
      letter-spacing: -0.3px;
    }

    .store-name {
      font-size: 0.8rem;  /* smaller store text */
      color: #475569;
      border-left: 3px solid #4f46e5;
      padding-left: 0.8rem;
      margin: 0.5rem 0 1.2rem 0;
      font-weight: 500;
    }

    /* Emoji panel - attractive emojis with slight shadow and larger size */
    .emoji-panel {
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .mood-btn {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      font-size: 2rem;   /* slightly larger emoji */
      padding: 0.7rem 0;
      width: 100%;
      border-radius: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .mood-btn:hover {
      transform: translateY(-2px);
      background: #f1f5f9;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    }
    .mood-btn.selected {
      transform: scale(1.01);
      box-shadow: 0 8px 20px -5px rgba(79,70,229,0.3);
    }
    .mood-btn.happy.selected { background: #dcfce7; border-color: #22c55e; }
    .mood-btn.neutral.selected { background: #fef9c3; border-color: #eab308; }
    .mood-btn.unhappy.selected { background: #ffe4e2; border-color: #ef4444; }

    /* Comment area */
    .comment-area {
      margin: 1rem 0;
    }
    label {
      font-weight: 600;
      font-size: 0.75rem;  /* smaller label */
      color: #0f172a;
      display: block;
      margin-bottom: 0.3rem;
    }
    textarea {
      width: 100%;
      padding: 0.7rem;
      border-radius: 1rem;
      border: 1.5px solid #e2e8f0;
      font-size: 0.8rem;   /* smaller text inside */
      resize: vertical;
      transition: 0.2s;
      font-family: inherit;
      background: #fefefe;
    }
    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .char-counter {
      text-align: right;
      font-size: 0.65rem;  /* smaller counter */
      color: #64748b;
      margin-top: 0.2rem;
    }
    button.submit {
      background: #4f46e5;
      border: none;
      width: 100%;
      padding: 0.7rem;
      font-size: 0.9rem;   /* smaller button text */
      font-weight: 600;
      color: white;
      border-radius: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(79,70,229,0.25);
    }
    button.submit:hover {
      background: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79,70,229,0.35);
    }
    .message {
      margin-top: 1rem;
      text-align: center;
      font-weight: 500;
      font-size: 0.75rem;  /* smaller message */
      padding: 0.5rem;
      border-radius: 1.5rem;
      background: #e6f7e6;
      color: #166534;
    }
    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
    }
    footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.65rem;  /* smaller footer */
      color: #94a3b8;
    }
    @media (max-width: 500px) {
      body { padding: 0.8rem; }
      .container { padding: 1.2rem; }
      .mood-btn { font-size: 1.8rem; padding: 0.6rem 0; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="nav-bar">
  <a href="https://bunny123-code.github.io/satisfaction-meter-mark2/index.html" class="active">📝 Customer Form</a>
  <a href="https://bunny123-code.github.io/satisfaction-meter-mark2/dashboard.html">📊 Dashboard</a>
</div>
<div class="container">
  <h1>😊 Satisfaction Meter</h1>
  <div class="store-name" id="storeNameDisplay">📍 Loading store...</div>

  <div class="emoji-panel">
    <button class="mood-btn happy" data-mood="happy">😊 Happy</button>
    <button class="mood-btn neutral" data-mood="neutral">😐 Neutral</button>
    <button class="mood-btn unhappy" data-mood="unhappy">😠 Unhappy</button>
  </div>

  <div class="comment-area">
    <label>💬 Additional comments (optional)</label>
    <textarea id="commentInput" rows="2" maxlength="300" placeholder="Tell us more..."></textarea>
    <div class="char-counter"><span id="charCount">0</span>/300</div>
  </div>

  <button class="submit" id="submitBtn">📨 Submit Feedback</button>
  <div id="statusMsg"></div>
  <footer>Your voice matters — completely anonymous</footer>
</div>

<script>
  // ======================== EDITABLE STORE NAME ========================
  const STORE_NAME = "My Store";   // 👈 Change this text to your store name
  // ====================================================================

  document.getElementById('storeNameDisplay').innerHTML = `🏪 ${STORE_NAME} · share your experience`;

  const moodBtns = document.querySelectorAll('.mood-btn');
  const commentInput = document.getElementById('commentInput');
  const charCountSpan = document.getElementById('charCount');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('statusMsg');

  let selectedMood = null;

  commentInput.addEventListener('input', () => {
    charCountSpan.textContent = commentInput.value.length;
  });
  charCountSpan.textContent = '0';

  moodBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const moodValue = btn.getAttribute('data-mood');
      selectedMood = moodValue;
      moodBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // IndexedDB
  const DB_NAME = 'SatisfactionMeterDB';
  const DB_VERSION = 1;
  const STORE_NAME_DB = 'feedback';

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve(request.result);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME_DB)) {
          db.createObjectStore(STORE_NAME_DB, { keyPath: 'id' });
        }
      };
    });
  }

  async function addFeedback(feedbackObj) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME_DB, 'readwrite');
      const store = tx.objectStore(STORE_NAME_DB);
      const request = store.add(feedbackObj);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve();
      tx.oncomplete = () => db.close();
    });
  }

  function generateId() {
    return Date.now() + '-' + Math.random().toString(36).substring(2, 10);
  }

  function resetFormUI() {
    selectedMood = null;
    moodBtns.forEach(btn => btn.classList.remove('selected'));
    commentInput.value = '';
    charCountSpan.textContent = '0';
    statusDiv.innerHTML = '';
  }

  function showMessage(text, isError = false) {
    statusDiv.innerHTML = `<div class="message ${isError ? 'error-msg' : ''}">${text}</div>`;
    if (!isError) {
      setTimeout(() => {
        if (statusDiv.innerHTML.includes(text)) statusDiv.innerHTML = '';
      }, 3000);
    }
  }

  submitBtn.addEventListener('click', async () => {
    if (!selectedMood) {
      showMessage('❌ Please tap a mood (Happy, Neutral, Unhappy) before submitting.', true);
      return;
    }
    const commentText = commentInput.value.trim();
    if (commentText.length > 300) {
      showMessage('⚠️ Comment exceeds 300 characters.', true);
      return;
    }

    const feedback = {
      id: generateId(),
      mood: selectedMood,
      comment: commentText,
      timestamp: new Date().toISOString()
    };

    try {
      await addFeedback(feedback);
      showMessage('✅ Thank you for your feedback! 🙏');
      resetFormUI();
    } catch (err) {
      console.error(err);
      showMessage('⚠️ Failed to save. Please try again.', true);
    }
  });

  // Register service worker (absolute URL)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('https://bunny123-code.github.io/satisfaction-meter-mark2/sw.js').then(reg => {
      console.log('Service Worker registered', reg);
    }).catch(err => console.log('SW registration failed', err));
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <title>Satisfaction Meter · Customer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(125deg, #f9f3e6 0%, #e6e9f0 100%);
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(79,70,229,0.08), transparent 70%);
      pointer-events: none;
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: scale(0.96) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .nav-bar {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 80px;
      display: inline-flex;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .nav-bar a {
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      color: #f1f5f9;
      background: rgba(255,255,255,0.05);
    }
    .nav-bar a.active, .nav-bar a:hover {
      background: #4f46e5;
      color: white;
      box-shadow: 0 4px 12px rgba(79,70,229,0.5);
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255,255,255,0.97);
      border-radius: 3rem;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.5);
      padding: 2rem 2rem 2.2rem;
      animation: floatIn 0.5s ease-out;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(115deg, #1e1b4b, #4f46e5, #7c3aed);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
      letter-spacing: -0.02em;
    }

    .store-name {
      font-size: 1rem;
      color: #2d3a5e;
      border-left: 4px solid #4f46e5;
      padding-left: 1rem;
      margin: 0.8rem 0 2rem 0;
      font-weight: 500;
      background: linear-gradient(90deg, #eef2ff, transparent);
      border-radius: 0 20px 20px 0;
      line-height: 1.3;
    }

    .emoji-panel {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .mood-btn {
      background: #ffffff;
      border: none;
      width: 100%;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 1.2, 0.4, 1);
      font-weight: 600;
      color: #1e293b;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
      border: 1px solid #eef2ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 0.5rem;
      gap: 0.4rem;
    }
    .mood-emoji {
      font-size: 1.8rem;
      transition: transform 0.2s;
    }
    .mood-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #334155;
    }
    .mood-btn:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 28px -12px rgba(0,0,0,0.2);
      border-color: #cbd5e1;
    }
    .mood-btn.selected {
      transform: scale(1.03) translateY(-3px);
      box-shadow: 0 18px 28px -10px rgba(0,0,0,0.2);
    }
    .mood-btn.happy.selected { background: #dcfce7; border-color: #22c55e; box-shadow: 0 12px 20px -8px #22c55e60; }
    .mood-btn.neutral.selected { background: #fef9c3; border-color: #eab308; box-shadow: 0 12px 20px -8px #eab30860; }
    .mood-btn.unhappy.selected { background: #ffe4e2; border-color: #ef4444; box-shadow: 0 12px 20px -8px #ef444460; }
    .mood-btn.selected .mood-emoji {
      transform: scale(1.1);
    }

    .comment-area {
      margin: 1.8rem 0;
    }
    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #0f172a;
      display: block;
      margin-bottom: 0.6rem;
    }
    textarea {
      width: 100%;
      padding: 1rem;
      border-radius: 1.5rem;
      border: 1.5px solid #e2e8f0;
      font-size: 0.9rem;
      resize: vertical;
      transition: 0.2s;
      font-family: inherit;
      background: #fefefe;
    }
    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79,70,229,0.2);
    }
    .char-counter {
      text-align: right;
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 0.3rem;
    }

    button.submit {
      background: linear-gradient(100deg, #4f46e5, #8b5cf6);
      border: none;
      width: 100%;
      padding: 1rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: white;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
      box-shadow: 0 10px 20px -5px rgba(79,70,229,0.5);
      letter-spacing: 0.3px;
    }
    button.submit:hover {
      background: linear-gradient(100deg, #4338ca, #7c3aed);
      transform: translateY(-2px);
      box-shadow: 0 18px 28px -8px rgba(79,70,229,0.7);
    }
    button.submit:active {
      transform: translateY(1px);
    }

    .message {
      margin-top: 1rem;
      text-align: center;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.8rem;
      border-radius: 2rem;
      background: #e6f7e6;
      color: #166534;
      animation: slideUp 0.2s ease;
    }
    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.7rem;
      color: #94a3b8;
    }

    @media (max-width: 550px) {
      body { padding: 1rem; }
      .container { padding: 1.5rem; }
      .mood-emoji { font-size: 1.4rem; }
      .mood-label { font-size: 0.65rem; }
      h1 { font-size: 1.5rem; }
      .emoji-panel { gap: 0.6rem; }
    }
  </style>
</head>
<body>
<div class="nav-bar" id="navBar">
  <a href="./index.html" class="active">📝 Customer Form</a>
  <a href="./dashboard.html">📊 Dashboard</a>
</div>
<div class="container">
  <h1>😊 Satisfaction Meter</h1>
  <div class="store-name" id="storeNameDisplay">📍 Loading store...</div>

  <div class="emoji-panel">
    <button class="mood-btn happy" data-mood="happy">
      <span class="mood-emoji">😊</span>
      <span class="mood-label">Happy</span>
    </button>
    <button class="mood-btn neutral" data-mood="neutral">
      <span class="mood-emoji">😐</span>
      <span class="mood-label">Neutral</span>
    </button>
    <button class="mood-btn unhappy" data-mood="unhappy">
      <span class="mood-emoji">😠</span>
      <span class="mood-label">Unhappy</span>
    </button>
  </div>

  <div class="comment-area">
    <label>💬 Additional comments (optional)</label>
    <textarea id="commentInput" rows="2" maxlength="300" placeholder="Tell us more..."></textarea>
    <div class="char-counter"><span id="charCount">0</span>/300</div>
  </div>

  <button class="submit" id="submitBtn">📨 Submit Feedback</button>
  <div id="statusMsg"></div>
  <footer>Your voice matters — completely anonymous</footer>
</div>

<script>
  // ---------- STORE NAME FROM URL (e.g., ?store=my_store) ----------
  function getStoreNameFromURL() {
    const params = new URLSearchParams(window.location.search);
    let store = params.get('store');
    if (store) {
      // Convert underscores/spaces to readable format
      store = store.replace(/_/g, ' ').replace(/%20/g, ' ');
      // Capitalize each word
      store = store.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
      return store;
    }
    return null;
  }

  const storeName = getStoreNameFromURL() || "My Store";
  document.getElementById('storeNameDisplay').innerHTML = `🏪 ${storeName} · share your experience`;

  // Update navigation links to preserve the store parameter
  const currentStoreParam = window.location.search;
  const navLinks = document.querySelectorAll('.nav-bar a');
  navLinks.forEach(link => {
    const href = link.getAttribute('href');
    if (href && !href.startsWith('http')) {
      const base = href.split('?')[0];
      link.setAttribute('href', base + currentStoreParam);
    }
  });

  // ---------- Feedback logic (unchanged) ----------
  const moodBtns = document.querySelectorAll('.mood-btn');
  const commentInput = document.getElementById('commentInput');
  const charCountSpan = document.getElementById('charCount');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('statusMsg');

  let selectedMood = null;

  commentInput.addEventListener('input', () => {
    charCountSpan.textContent = commentInput.value.length;
  });
  charCountSpan.textContent = '0';

  moodBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const moodValue = btn.getAttribute('data-mood');
      selectedMood = moodValue;
      moodBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  const DB_NAME = 'SatisfactionMeterDB';
  const DB_VERSION = 1;
  const STORE_NAME_DB = 'feedback';

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve(request.result);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME_DB)) {
          db.createObjectStore(STORE_NAME_DB, { keyPath: 'id' });
        }
      };
    });
  }

  async function addFeedback(feedbackObj) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME_DB, 'readwrite');
      const store = tx.objectStore(STORE_NAME_DB);
      const request = store.add(feedbackObj);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve();
      tx.oncomplete = () => db.close();
    });
  }

  function generateId() {
    return Date.now() + '-' + Math.random().toString(36).substring(2, 10);
  }

  function resetFormUI() {
    selectedMood = null;
    moodBtns.forEach(btn => btn.classList.remove('selected'));
    commentInput.value = '';
    charCountSpan.textContent = '0';
    statusDiv.innerHTML = '';
  }

  function showMessage(text, isError = false) {
    statusDiv.innerHTML = `<div class="message ${isError ? 'error-msg' : ''}">${text}</div>`;
    if (!isError) {
      setTimeout(() => {
        if (statusDiv.innerHTML.includes(text)) statusDiv.innerHTML = '';
      }, 3000);
    }
  }

  submitBtn.addEventListener('click', async () => {
    if (!selectedMood) {
      showMessage('❌ Please tap a mood (Happy, Neutral, Unhappy) before submitting.', true);
      return;
    }
    const commentText = commentInput.value.trim();
    if (commentText.length > 300) {
      showMessage('⚠️ Comment exceeds 300 characters.', true);
      return;
    }

    const feedback = {
      id: generateId(),
      mood: selectedMood,
      comment: commentText,
      timestamp: new Date().toISOString()
    };

    try {
      await addFeedback(feedback);
      showMessage('✅ Thank you for your feedback! 🙏');
      resetFormUI();
    } catch (err) {
      console.error(err);
      showMessage('⚠️ Failed to save. Please try again.', true);
    }
  });

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered', reg))
      .catch(err => console.log('SW failed', err));
  }
</script>
</body>
</html>
